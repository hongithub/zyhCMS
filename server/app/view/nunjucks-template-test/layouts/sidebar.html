<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>侧边栏布局模板</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <!-- 页头组件 -->
    <header>
      <h1>这是侧边栏布局模板 (layouts/sidebar.html)</h1>
      <p>这是带有侧边栏的布局结构</p>
    </header>

    <div class="container">
      <!-- 侧边栏区域 -->
      <aside class="sidebar">
        <h2>侧边栏区域</h2>
        <nav>
          <ul>
            <li><a href="#">导航项目 1</a></li>
            <li><a href="#">导航项目 2</a></li>
            <li><a href="#">导航项目 3</a></li>
          </ul>
        </nav>
      </aside>

      <!-- 主体内容区域 -->
      <main class="main-content">
        {% block content %}
        <div class="content">
          <h2>主体内容区域</h2>
          <p>这里将显示具体页面的内容，与侧边栏并排显示</p>
          <!-- 页面内容将在这里渲染 -->
        </div>
        {% endblock %}
      </main>
    </div>

    <!-- 页脚组件 -->
    <footer>
      <p>这是页脚区域 - 侧边栏布局模板</p>
    </footer>

    <script src="/assets/js/main.js"></script>
  </body>
</html>
